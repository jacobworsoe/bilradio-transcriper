<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilradio — Topics</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <h1>Bilradio</h1>
    <nav style="display:flex;gap:1.25rem;margin-bottom:.75rem;font-size:.9rem;">
      <a href="/" style="color:var(--text);font-weight:600;text-decoration:none;">Topics</a>
      <a href="/episodes" style="color:var(--accent);text-decoration:none;">Episodes status</a>
    </nav>
    <p class="lede">Bullet-point summaries from all episodes. Select cars or themes to <strong>exclude</strong> from the overview.</p>
  </header>

  <section class="filters" id="filters">
    <div class="filter-block">
      <h2>Cars (exclude)</h2>
      <div class="chips" id="car-chips"></div>
    </div>
    <div class="filter-block">
      <h2>Themes (exclude)</h2>
      <div class="chips" id="theme-chips"></div>
    </div>
    <p class="hint">Selections are saved in your browser (localStorage) between visits.</p>
  </section>

  <section class="summary">
    <p id="count-line" class="count-line">Loading…</p>
  </section>

  <main id="main-bullets"></main>

  <script>
    const STORAGE_CARS   = "bilradio_exclude_cars";
    const STORAGE_THEMES = "bilradio_exclude_themes";

    function loadSet(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? new Set(JSON.parse(raw)) : new Set();
      } catch { return new Set(); }
    }
    function saveSet(key, set) {
      localStorage.setItem(key, JSON.stringify([...set]));
    }

    let excludeCars   = loadSet(STORAGE_CARS);
    let excludeThemes = loadSet(STORAGE_THEMES);

    function chip(label, kind, value, active) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "chip" + (active ? " chip-off" : "");
      b.textContent = label;
      b.title = active ? "Click to show bullets with this label again" : "Click to hide bullets with this label";
      b.addEventListener("click", () => {
        const set = kind === "car" ? excludeCars : excludeThemes;
        const sk  = kind === "car" ? STORAGE_CARS : STORAGE_THEMES;
        if (set.has(value)) set.delete(value); else set.add(value);
        saveSet(sk, set);
        renderFacets(window.__lastFacets || { cars: [], themes: [] });
        loadBullets();
      });
      return b;
    }

    function renderFacets(data) {
      window.__lastFacets = data;
      const carEl   = document.getElementById("car-chips");
      const themeEl = document.getElementById("theme-chips");
      carEl.innerHTML = "";
      themeEl.innerHTML = "";
      for (const c of data.cars)   carEl.appendChild(chip(c,   "car",   c, excludeCars.has(c)));
      for (const t of data.themes) themeEl.appendChild(chip(t, "theme", t, excludeThemes.has(t)));
      if (!data.cars.length)   carEl.textContent   = "No car tags yet — run extract on episodes.";
      if (!data.themes.length) themeEl.textContent = "No theme tags yet.";
    }

    async function loadFacets() {
      const r = await fetch("/api/facets");
      renderFacets(await r.json());
    }

    function qsParams() {
      const p = new URLSearchParams();
      for (const c of excludeCars)   p.append("exclude_car",   c);
      for (const t of excludeThemes) p.append("exclude_theme", t);
      return p.toString();
    }

    function sectionGroupKey(b) {
      return (
        b.episode_guid +
        "\0" +
        String(b.section_order ?? 0) +
        "\0" +
        (b.section_title || "").trim()
      );
    }

    function aggregateSectionTags(bullets) {
      const cars = [];
      const themes = [];
      const seenC = new Set();
      const seenT = new Set();
      for (const b of bullets) {
        for (const c of b.cars || []) {
          const x = String(c).trim();
          if (x && !seenC.has(x.toLowerCase())) {
            seenC.add(x.toLowerCase());
            cars.push(x);
          }
        }
        for (const t of b.themes || []) {
          const x = String(t).trim();
          if (x && !seenT.has(x.toLowerCase())) {
            seenT.add(x.toLowerCase());
            themes.push(x);
          }
        }
      }
      return { cars, themes };
    }

    async function loadBullets() {
      const main = document.getElementById("main-bullets");
      const countLine = document.getElementById("count-line");
      main.innerHTML = "";
      countLine.textContent = "Loading…";
      const q = qsParams();
      const r = await fetch("/api/bullets" + (q ? "?" + q : ""));
      const data = await r.json();
      countLine.textContent =
        data.count + " bullet" + (data.count === 1 ? "" : "s") + " (after filters)";

      const groups = [];
      let cur = null;
      for (const b of data.bullets) {
        const k = sectionGroupKey(b);
        if (!cur || cur.key !== k) {
          cur = { key: k, bullets: [] };
          groups.push(cur);
        }
        cur.bullets.push(b);
      }

      let lastEpisodeGuid = null;
      for (const g of groups) {
        const first = g.bullets[0];
        const sec = (first.section_title || "").trim();
        const epGuid = first.episode_guid;
        const firstSectionOfEpisode = lastEpisodeGuid !== epGuid;
        lastEpisodeGuid = epGuid;

        if (firstSectionOfEpisode) {
          const h = document.createElement("h2");
          h.className = "section-heading episode-heading";
          const d = (first.pub_date || "").slice(0, 10);
          h.textContent = d
            ? d + " - " + first.episode_title
            : first.episode_title;
          main.appendChild(h);
        }

        const summary = document.createElement("div");
        summary.className =
          "topic-section-summary" +
          (firstSectionOfEpisode ? "" : " topic-section-summary-follow");
        const rangeEl = document.createElement("span");
        rangeEl.className = "topic-time-range";
        rangeEl.textContent = first.section_time_range || "[— – —]";
        summary.appendChild(rangeEl);
        const secTitle = document.createElement("span");
        secTitle.className = "topic-section-title-inline";
        secTitle.textContent = (sec || "Episode").trim();
        summary.appendChild(secTitle);
        const agg = aggregateSectionTags(g.bullets);
        const tagWrap = document.createElement("span");
        tagWrap.className = "topic-section-tags";
        for (const c of agg.cars) {
          const s = document.createElement("span");
          s.className = "tag car tag-compact";
          s.textContent = c;
          tagWrap.appendChild(s);
        }
        for (const t of agg.themes) {
          const s = document.createElement("span");
          s.className = "tag theme tag-compact";
          s.textContent = t;
          tagWrap.appendChild(s);
        }
        summary.appendChild(tagWrap);
        main.appendChild(summary);

        const sub = document.createElement("ul");
        sub.className = "topic-bullet-sublist";
        for (const b of g.bullets) {
          const li = document.createElement("li");
          li.className = "topic-bullet-sub" + (b.uncertain ? " uncertain" : "");
          if (b.bullet_time_range) {
            const br = document.createElement("span");
            br.className = "topic-time-range";
            br.textContent = b.bullet_time_range;
            li.appendChild(br);
          }
          const tx = document.createElement("span");
          tx.className = "topic-bullet-text";
          tx.textContent = b.text;
          li.appendChild(tx);
          if (b.uncertain) {
            const u = document.createElement("span");
            u.className = "uncertain-badge uncertain-inline";
            u.textContent = "Uncertain";
            li.appendChild(u);
          }
          sub.appendChild(li);
        }
        main.appendChild(sub);
      }
    }

    loadFacets().then(loadBullets);
  </script>
</body>
</html>
